<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>両面神経衰弱（原案準拠版）</title>
<style>
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background-color: #f0f4f8;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        margin: 0;
    }
    h1 {
        margin-bottom: 10px;
        color: #2c3e50;
    }
    .info {
        margin-bottom: 20px;
        text-align: center;
    }
    .message {
        font-weight: bold;
        height: 1.5em;
        color: #333;
        margin-bottom: 5px;
    }
    .score {
        font-size: 1.1em;
        color: #555;
    }
    .board {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
        max-width: 600px;
        width: 100%;
    }
    @media (max-width: 500px) {
        .board {
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
    }
    .card {
        aspect-ratio: 3 / 4;
        perspective: 1000px;
        cursor: pointer;
    }
    .card-inner {
        width: 100%;
        height: 100%;
        transition: transform 0.5s, opacity 0.5s;
        transform-style: preserve-3d;
        position: relative;
    }
    /* isFlipped 状態のときに反転させる */
    .card.flipped .card-inner {
        transform: rotateY(180deg);
    }
    .card.matched .card-inner {
        opacity: 0.3;
    }
    .card.matched {
        cursor: default;
    }
    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        font-weight: bold;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        user-select: none;
    }
    /* 表面と裏面（どちらも同等のデザイン） */
    .card-front {
        background-color: #fff;
        color: #2c3e50;
        border: 2px solid #bdc3c7;
    }
    .card-back {
        background-color: #ecf0f1;
        color: #2c3e50;
        transform: rotateY(180deg);
        border: 2px solid #bdc3c7;
    }
    .card.matched .card-front, .card.matched .card-back {
        background-color: #27ae60;
        color: #fff;
        border-color: #2ecc71;
    }
    .card.selected .card-front, .card.selected .card-back {
        box-shadow: 0 0 0 4px #f39c12;
    }
    .controls {
        margin-top: 25px;
    }
    button {
        padding: 10px 25px;
        font-size: 1rem;
        cursor: pointer;
        background-color: #2c3e50;
        color: white;
        border: none;
        border-radius: 5px;
        transition: background-color 0.2s;
    }
    button:hover {
        background-color: #1a252f;
    }
    .instructions {
        margin-top: 30px;
        max-width: 600px;
        background: #fff;
        padding: 15px 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        font-size: 0.9rem;
        line-height: 1.6;
    }
</style>
</head>
<body>

<h1>両面神経衰弱</h1>
<div class="info">
    <div class="message" id="message">カードを2枚めくってください。</div>
    <div class="score" id="score">獲得ペア: 0</div>
</div>

<div class="board" id="game-board"></div>

<div class="controls">
    <button onclick="initGame()">リスタート</button>
</div>

<div class="instructions">
    <strong>【ルールと特徴（原案版）】</strong><br>
    ・A〜Eのすべての組み合わせ（全15枚）を使います。<br>
    ・カードを2枚めくり、<strong>新たに出た文字同士</strong>が揃えばペア成立です。<br>
    ・<strong>【重要】</strong>文字が揃わなかった場合、カードは元に戻らず、裏返った状態のまま場に残ります。<br>
    ・めくるたびに場の文字数が変化するため、タイミングによっては「どうめくっても絶対にペアが作れない（詰み）」状態になります。最終的に何枚残るか（どれだけ少なくできるか）を楽しむゲームです。
</div>

<script>
    const letters = ['A', 'B', 'C', 'D', 'E'];
    let cardsData = [];
    let selectedCards = [];
    let lockBoard = false;
    let matchedPairs = 0;

    function initGame() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        selectedCards = [];
        lockBoard = false;
        matchedPairs = 0;
        updateScore();
        document.getElementById('message').textContent = 'カードを2枚めくってください。';
        document.getElementById('message').style.color = '#333';

        // 15種類の組み合わせをすべて生成
        let combinations = [];
        for (let i = 0; i < letters.length; i++) {
            for (let j = i; j < letters.length; j++) {
                combinations.push([letters[i], letters[j]]);
            }
        }

        // シャッフル
        combinations.sort(() => Math.random() - 0.5);

        // 各カードの初期の表裏をランダムに決定
        cardsData = combinations.map((pair, index) => {
            let isReversed = Math.random() > 0.5;
            return {
                id: index,
                faceFront: isReversed ? pair[1] : pair[0],
                faceBack: isReversed ? pair[0] : pair[1],
                isFlipped: false,
                isMatched: false
            };
        });
        
        cardsData.forEach((card, index) => {
            const cardElement = document.createElement('div');
            cardElement.classList.add('card');
            cardElement.dataset.index = index;

            const cardInner = document.createElement('div');
            cardInner.classList.add('card-inner');

            const cardFront = document.createElement('div');
            cardFront.classList.add('card-face', 'card-front');
            cardFront.textContent = card.faceFront;

            const cardBack = document.createElement('div');
            cardBack.classList.add('card-face', 'card-back');
            cardBack.textContent = card.faceBack;

            cardInner.appendChild(cardFront);
            cardInner.appendChild(cardBack);
            cardElement.appendChild(cardInner);

            cardElement.addEventListener('click', () => flipCard(index, cardElement));

            board.appendChild(cardElement);
        });
    }

    function flipCard(index, cardElement) {
        if (lockBoard) return;
        if (cardsData[index].isMatched) return;
        
        // 同じターンで既に選んだカードは選択できない
        if (selectedCards.some(c => c.index === index)) return;

        // カードを裏返す（状態の反転）
        cardsData[index].isFlipped = !cardsData[index].isFlipped;
        cardElement.classList.toggle('flipped');
        cardElement.classList.add('selected');

        selectedCards.push({ index, element: cardElement });

        if (selectedCards.length === 1) {
            document.getElementById('message').textContent = 'もう1枚めくってください。';
            document.getElementById('message').style.color = '#333';
        } else if (selectedCards.length === 2) {
            lockBoard = true;
            checkMatch();
        }
    }

    function checkMatch() {
        const c1 = cardsData[selectedCards[0].index];
        const c2 = cardsData[selectedCards[1].index];

        // 判定には、反転状態を考慮した「現在見えている文字」を使用
        const currentFace1 = c1.isFlipped ? c1.faceBack : c1.faceFront;
        const currentFace2 = c2.isFlipped ? c2.faceBack : c2.faceFront;

        if (currentFace1 === currentFace2) {
            // ペア成立
            c1.isMatched = true;
            c2.isMatched = true;
            matchedPairs++;
            
            selectedCards[0].element.classList.remove('selected');
            selectedCards[1].element.classList.remove('selected');
            selectedCards[0].element.classList.add('matched');
            selectedCards[1].element.classList.add('matched');
            
            updateScore();
            
            document.getElementById('message').textContent = 'ペア成立！';
            document.getElementById('message').style.color = '#27ae60';
            
            setTimeout(() => {
                selectedCards = [];
                lockBoard = false;
                checkGameOver();
            }, 600);
        } else {
            // ペア不成立（カードは戻さずそのまま）
            document.getElementById('message').textContent = '違いました（そのまま残ります）。';
            document.getElementById('message').style.color = '#e74c3c';
            
            setTimeout(() => {
                selectedCards[0].element.classList.remove('selected');
                selectedCards[1].element.classList.remove('selected');
                selectedCards = [];
                lockBoard = false;
                
                checkGameOver();
            }, 1000);
        }
    }

    function updateScore() {
        document.getElementById('score').textContent = `獲得ペア: ${matchedPairs}`;
    }

    function checkGameOver() {
        let remainingCards = cardsData.filter(c => !c.isMatched);
        
        if (remainingCards.length <= 1) {
             document.getElementById('message').textContent = `ゲーム終了！ 見事なプレイです！ (残り${remainingCards.length}枚)`;
             document.getElementById('message').style.color = '#2980b9';
             return;
        }

        // 残ったカードの中に共通する文字が1つも無い場合は完全に手詰まり
        let letterCounts = {};
        for (let card of remainingCards) {
            let uniqueLetters = new Set([card.faceFront, card.faceBack]);
            for (let l of uniqueLetters) {
                letterCounts[l] = (letterCounts[l] || 0) + 1;
            }
        }

        let possibleMatchesExist = Object.values(letterCounts).some(count => count >= 2);
        
        if (!possibleMatchesExist) {
            document.getElementById('message').textContent = `手詰まりです！ (残り${remainingCards.length}枚)`;
            document.getElementById('message').style.color = '#8e44ad';
        } else if (selectedCards.length === 0) {
            document.getElementById('message').textContent = 'カードを2枚めくってください。';
            document.getElementById('message').style.color = '#333';
        }
    }

    // 初回起動
    window.onload = initGame;
</script>
</body>
</html>
