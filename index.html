<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>両面神経衰弱（2人対戦版）</title>
<style>
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background-color: #f0f4f8;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        margin: 0;
    }
    h1 {
        margin-bottom: 10px;
        color: #2c3e50;
    }
    
    /* スコアとターン表示用UI */
    .score-board {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
        width: 100%;
        max-width: 600px;
        justify-content: center;
    }
    .player-score {
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 1.2rem;
        font-weight: bold;
        background-color: #ecf0f1;
        color: #7f8c8d;
        border: 3px solid transparent;
        transition: all 0.3s ease;
        text-align: center;
        flex: 1;
        max-width: 200px;
    }
    .player1.active {
        background-color: #e1f5fe;
        color: #0277bd;
        border-color: #03a9f4;
        box-shadow: 0 0 10px rgba(3, 169, 244, 0.4);
    }
    .player2.active {
        background-color: #fce4ec;
        color: #c2185b;
        border-color: #e91e63;
        box-shadow: 0 0 10px rgba(233, 30, 99, 0.4);
    }

    .info {
        margin-bottom: 20px;
        text-align: center;
    }
    .message {
        font-weight: bold;
        font-size: 1.2rem;
        height: 1.5em;
        color: #333;
        margin-bottom: 5px;
        transition: color 0.3s;
    }
    .board {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
        max-width: 600px;
        width: 100%;
    }
    @media (max-width: 500px) {
        .board {
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
    }
    .card {
        aspect-ratio: 3 / 4;
        perspective: 1000px;
        cursor: pointer;
    }
    .card-inner {
        width: 100%;
        height: 100%;
        transition: transform 0.5s, opacity 0.5s;
        transform-style: preserve-3d;
        position: relative;
    }
    .card.flipped .card-inner {
        transform: rotateY(180deg);
    }
    .card.matched .card-inner {
        opacity: 0.3;
    }
    .card.matched {
        cursor: default;
    }
    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        font-weight: bold;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        user-select: none;
    }
    .card-front {
        background-color: #fff;
        color: #2c3e50;
        border: 2px solid #bdc3c7;
    }
    .card-back {
        background-color: #ecf0f1;
        color: #2c3e50;
        transform: rotateY(180deg);
        border: 2px solid #bdc3c7;
    }
    
    /* 誰が取ったペアか分かりやすく色を分ける */
    .card.matched.p1-match .card-front, .card.matched.p1-match .card-back {
        background-color: #03a9f4;
        color: #fff;
        border-color: #0288d1;
    }
    .card.matched.p2-match .card-front, .card.matched.p2-match .card-back {
        background-color: #e91e63;
        color: #fff;
        border-color: #c2185b;
    }

    /* 選択中のカードのハイライト枠 */
    .card.selected .card-front, .card.selected .card-back {
        box-shadow: 0 0 0 4px #f39c12;
    }

    .controls {
        margin-top: 25px;
    }
    button {
        padding: 10px 25px;
        font-size: 1rem;
        cursor: pointer;
        background-color: #2c3e50;
        color: white;
        border: none;
        border-radius: 5px;
        transition: background-color 0.2s;
    }
    button:hover {
        background-color: #1a252f;
    }
    .instructions {
        margin-top: 30px;
        max-width: 600px;
        background: #fff;
        padding: 15px 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        font-size: 0.9rem;
        line-height: 1.6;
    }
</style>
</head>
<body>

<h1>両面神経衰弱</h1>

<div class="score-board">
    <div id="score-1" class="player-score player1">1P: 0ペア</div>
    <div id="score-2" class="player-score player2">2P: 0ペア</div>
</div>

<div class="info">
    <div class="message" id="message"></div>
</div>

<div class="board" id="game-board"></div>

<div class="controls">
    <button onclick="initGame()">リスタート</button>
</div>

<div class="instructions">
    <strong>【2人対戦ルール】</strong><br>
    ・1つの画面を使い、1P（青）と2P（赤）で交互にカードを2枚めくります。<br>
    ・新たに出た文字同士が揃えばペア成立！<strong>続けて同じプレイヤーのターン</strong>になります。<br>
    ・文字が揃わなかった場合、カードは元に戻らず、<strong>裏返った状態のまま相手のターン</strong>に移ります。<br>
    ・すべてのペアが取られるか、「手詰まり（場にあるカードから絶対にペアが作れない状態）」になったらゲーム終了。獲得ペア数が多い方の勝利です。
</div>

<script>
    const letters = ['A', 'B', 'C', 'D', 'E'];
    let cardsData = [];
    let selectedCards = [];
    let lockBoard = false;
    
    // 対戦用ステータス
    let currentPlayer = 1; // 1 or 2
    let scores = { 1: 0, 2: 0 };

    function initGame() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        selectedCards = [];
        lockBoard = false;
        
        // ステータス初期化
        currentPlayer = 1;
        scores = { 1: 0, 2: 0 };
        updateUI();

        // 15種類の組み合わせをすべて生成
        let combinations = [];
        for (let i = 0; i < letters.length; i++) {
            for (let j = i; j < letters.length; j++) {
                combinations.push([letters[i], letters[j]]);
            }
        }

        // シャッフル
        combinations.sort(() => Math.random() - 0.5);

        // 各カードの初期の表裏をランダムに決定
        cardsData = combinations.map((pair, index) => {
            let isReversed = Math.random() > 0.5;
            return {
                id: index,
                faceFront: isReversed ? pair[1] : pair[0],
                faceBack: isReversed ? pair[0] : pair[1],
                isFlipped: false,
                isMatched: false,
                matchedBy: null // 誰が取ったかを記録
            };
        });
        
        cardsData.forEach((card, index) => {
            const cardElement = document.createElement('div');
            cardElement.classList.add('card');
            cardElement.dataset.index = index;

            const cardInner = document.createElement('div');
            cardInner.classList.add('card-inner');

            const cardFront = document.createElement('div');
            cardFront.classList.add('card-face', 'card-front');
            cardFront.textContent = card.faceFront;

            const cardBack = document.createElement('div');
            cardBack.classList.add('card-face', 'card-back');
            cardBack.textContent = card.faceBack;

            cardInner.appendChild(cardFront);
            cardInner.appendChild(cardBack);
            cardElement.appendChild(cardInner);

            cardElement.addEventListener('click', () => flipCard(index, cardElement));

            board.appendChild(cardElement);
        });
        
        showMessage(`1Pのターンです。カードをめくってください。`, '#0277bd');
    }

    function flipCard(index, cardElement) {
        if (lockBoard) return;
        if (cardsData[index].isMatched) return;
        
        // 同じターンで既に選んだカードは選択できない
        if (selectedCards.some(c => c.index === index)) return;

        // カードを裏返す
        cardsData[index].isFlipped = !cardsData[index].isFlipped;
        cardElement.classList.toggle('flipped');
        cardElement.classList.add('selected');

        selectedCards.push({ index, element: cardElement });

        if (selectedCards.length === 1) {
            showMessage(`${currentPlayer}P：もう1枚めくってください。`, currentPlayer === 1 ? '#0277bd' : '#c2185b');
        } else if (selectedCards.length === 2) {
            lockBoard = true;
            checkMatch();
        }
    }

    function checkMatch() {
        const c1 = cardsData[selectedCards[0].index];
        const c2 = cardsData[selectedCards[1].index];

        const currentFace1 = c1.isFlipped ? c1.faceBack : c1.faceFront;
        const currentFace2 = c2.isFlipped ? c2.faceBack : c2.faceFront;

        if (currentFace1 === currentFace2) {
            // ペア成立
            c1.isMatched = true;
            c2.isMatched = true;
            c1.matchedBy = currentPlayer;
            c2.matchedBy = currentPlayer;
            scores[currentPlayer]++;
            
            selectedCards[0].element.classList.remove('selected');
            selectedCards[1].element.classList.remove('selected');
            selectedCards[0].element.classList.add('matched', currentPlayer === 1 ? 'p1-match' : 'p2-match');
            selectedCards[1].element.classList.add('matched', currentPlayer === 1 ? 'p1-match' : 'p2-match');
            
            
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            showMessage(`ペア成立！ 次は${currentPlayer}Pのターンです。`, '#27ae60');
            updateUI();
            setTimeout(() => {
                selectedCards = [];
                lockBoard = false;
                checkGameOver(true);
            }, 600);
        } else {
            // ペア不成立
            showMessage(`違いました。（カードはそのまま残ります）`, '#e74c3c');
            
            setTimeout(() => {
                selectedCards[0].element.classList.remove('selected');
                selectedCards[1].element.classList.remove('selected');
                selectedCards = [];
                
                // ターンチェンジ
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                updateUI();
                
                lockBoard = false;
                checkGameOver(false);
            }, 1200);
        }
    }

    function updateUI() {
        document.getElementById('score-1').textContent = `1P: ${scores[1]}ペア`;
        document.getElementById('score-2').textContent = `2P: ${scores[2]}ペア`;
        
        if (currentPlayer === 1) {
            document.getElementById('score-1').classList.add('active');
            document.getElementById('score-2').classList.remove('active');
        } else {
            document.getElementById('score-1').classList.remove('active');
            document.getElementById('score-2').classList.add('active');
        }
    }

    function showMessage(text, color) {
        const msgEl = document.getElementById('message');
        msgEl.textContent = text;
        msgEl.style.color = color;
    }

    function checkGameOver(wasMatch) {
        let remainingCards = cardsData.filter(c => !c.isMatched);
        
        // 終了条件チェック用変数
        let isGameOver = false;
        let gameOverReason = "";

        if (remainingCards.length <= 1) {
             isGameOver = true;
             gameOverReason = `最後のカードです。`;
        } else {
            // 手詰まりチェック
            let letterCounts = {};
            for (let card of remainingCards) {
                let uniqueLetters = new Set([card.faceFront, card.faceBack]);
                for (let l of uniqueLetters) {
                    letterCounts[l] = (letterCounts[l] || 0) + 1;
                }
            }

            let possibleMatchesExist = Object.values(letterCounts).some(count => count >= 2);
            if (!possibleMatchesExist) {
                isGameOver = true;
                gameOverReason = `手詰まりです！`;
            }
        }

        // ゲームオーバー処理
        if (isGameOver) {
            let resultText = "";
            if (scores[1] > scores[2]) resultText = "1Pの勝利！";
            else if (scores[2] > scores[1]) resultText = "2Pの勝利！";
            else resultText = "引き分け！";
            
            showMessage(`終了（${gameOverReason}） ${resultText}`, '#8e44ad');
            document.getElementById('score-1').classList.remove('active');
            document.getElementById('score-2').classList.remove('active');
            lockBoard = true;
            return;
        }

        // ゲーム続行の場合のメッセージ更新
        if (!wasMatch) {
            showMessage(`${currentPlayer}Pのターンです。カードをめくってください。`, currentPlayer === 1 ? '#0277bd' : '#c2185b');
        }
    }

    // 初回起動
    window.onload = initGame;
</script>
</body>
</html>
